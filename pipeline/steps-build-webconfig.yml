# Reusable steps: generate web.config for ${{ parameters.environment }},
# pull secrets from Azure Key Vault (env-prefixed), substitute tokens, and
# publish as an artifact.
parameters:
  - name: environment
    type: string
  - name: vaultName
    type: string
    default: ''
  - name: serviceConnection
    type: string
    default: ''
  - name: secretNames
    type: object
    default: []

steps:
  - task: PowerShell@2
    displayName: Generate tokenized web.config (${{ parameters.environment }})
    env:
      # Clear PSModulePath so pwsh 7 doesn't try to load Windows PowerShell 5.1
      # modules (causes "TypeData already present" / Security module load errors
      # on ARM Windows).
      PSModulePath: ''
    inputs:
      filePath: $(Build.SourcesDirectory)/Build-WebConfig.ps1
      arguments: -Environment ${{ parameters.environment }} -OutputPath $(Build.ArtifactStagingDirectory)/web.config
      pwsh: true

  # Pull env-prefixed secrets from Key Vault, then alias them under their bare
  # names so the existing #{Token}# names in web.config keep working.
  - ${{ if and(ne(parameters.vaultName, ''), gt(length(parameters.secretNames), 0)) }}:
      - task: AzureKeyVault@2
        displayName: Fetch ${{ parameters.environment }} secrets from ${{ parameters.vaultName }}
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          KeyVaultName: ${{ parameters.vaultName }}
          SecretsFilter: ${{ parameters.environment }}-*
          RunAsPreJob: false

      - ${{ each name in parameters.secretNames }}:
          - pwsh: Write-Host "##vso[task.setvariable variable=${{ name }};issecret=true]$(${{ parameters.environment }}-${{ name }})"
            displayName: Alias secret ${{ name }}

  # Marketplace task: qetza.replacetokens.replacetokens-task.replacetokens@6
  # Requires the "Replace Tokens" extension to be installed in your ADO org.
  - task: replacetokens@6
    displayName: Replace #{...}# tokens with variable group + vault values
    inputs:
      root: $(Build.ArtifactStagingDirectory)
      sources: web.config
      tokenPattern: default      # #{Var}# style
      missingVarLog: error       # fail the build if any token is unresolved
      logLevel: info

  - publish: $(Build.ArtifactStagingDirectory)/web.config
    artifact: webconfig-${{ parameters.environment }}
    displayName: Publish web.config artifact

  - task: PowerShell@2
    displayName: Print generated web.config (${{ parameters.environment }})
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $path = "$(Build.ArtifactStagingDirectory)/web.config"
        Write-Host "----- BEGIN $path -----"
        Get-Content -LiteralPath $path -Raw | Write-Host
        Write-Host "----- END $path -----"
