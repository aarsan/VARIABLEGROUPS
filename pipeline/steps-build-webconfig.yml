# Reusable steps: generate web.config for ${{ parameters.environment }},
# alias prefixed secrets (already pulled by Key-Vault-linked variable groups
# at stage scope) under their bare names, substitute tokens, and publish as
# an artifact.
parameters:
  - name: environment
    type: string
  - name: commonSecretNames
    type: object
    default: []
  - name: secretNames
    type: object
    default: []

steps:
  - task: PowerShell@2
    displayName: Generate tokenized web.config (${{ parameters.environment }})
    env:
      # Clear PSModulePath so pwsh 7 doesn't try to load Windows PowerShell 5.1
      # modules (causes "TypeData already present" / Security module load errors
      # on ARM Windows).
      PSModulePath: ''
    inputs:
      filePath: $(Build.SourcesDirectory)/Build-WebConfig.ps1
      arguments: -Environment ${{ parameters.environment }} -OutputPath $(Build.ArtifactStagingDirectory)/web.config
      pwsh: true

  # Alias each common-prefixed secret (from `webconfig-common-secrets`) under
  # its bare name. Done FIRST so env-prefixed aliases below can override.
  - ${{ each name in parameters.commonSecretNames }}:
      - task: PowerShell@2
        displayName: Alias common secret ${{ name }}
        env:
          PSModulePath: ''
        inputs:
          targetType: inline
          pwsh: true
          script: Write-Host "##vso[task.setvariable variable=${{ name }};issecret=true]$(common-${{ name }})"

  # Alias each env-prefixed secret variable (e.g. `dev-DefaultConnection`,
  # provided by the `webconfig-<env>-secrets` Key-Vault-linked variable group)
  # under its bare name so the existing #{Token}# names in web.config keep
  # working. Listed after common aliases so env overrides common.
  - ${{ each name in parameters.secretNames }}:
      - task: PowerShell@2
        displayName: Alias secret ${{ name }}
        env:
          PSModulePath: ''
        inputs:
          targetType: inline
          pwsh: true
          script: Write-Host "##vso[task.setvariable variable=${{ name }};issecret=true]$(${{ parameters.environment }}-${{ name }})"

  # Marketplace task: qetza.replacetokens.replacetokens-task.replacetokens@6
  # Requires the "Replace Tokens" extension to be installed in your ADO org.
  - task: replacetokens@6
    displayName: Replace #{...}# tokens with variable group + vault values
    inputs:
      root: $(Build.ArtifactStagingDirectory)
      sources: web.config
      tokenPattern: default      # #{Var}# style
      missingVarLog: error       # fail the build if any token is unresolved
      logLevel: info

  - publish: $(Build.ArtifactStagingDirectory)/web.config
    artifact: webconfig-${{ parameters.environment }}
    displayName: Publish web.config artifact

  - task: PowerShell@2
    displayName: Print generated web.config (${{ parameters.environment }})
    env:
      PSModulePath: ''
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $path = "$(Build.ArtifactStagingDirectory)/web.config"
        Write-Host "----- BEGIN $path -----"
        Get-Content -LiteralPath $path -Raw | Write-Host
        Write-Host "----- END $path -----"
