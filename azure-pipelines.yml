# Builds a web.config for a given environment by:
#   1. Running Build-WebConfig.ps1 to produce a tokenized web.config
#   2. Pulling env-prefixed secrets from Azure Key Vault and aliasing them
#   3. Replacing #{...}# tokens with values from the variable group + AKV
#   4. Publishing the finished web.config as a pipeline artifact

trigger:
  branches:
    include: [ main ]

pool:
  name: Default   # self-hosted agent pool; switch back to `vmImage: windows-latest` once MS-hosted parallelism is granted

variables:
  KeyVaultName: Progger
  # Service connection id for `ahmet-azure-sub (a0fc4f7c-9c55-4151-b900-07761c35237c)`.
  # Referencing by id avoids quoting issues with parentheses in the display name.
  KeyVaultServiceConnection: '9ff0532e-317f-4fe7-8cdb-d772859ae9d8'

stages:
  - stage: Dev
    displayName: Build web.config (dev)
    variables:
      - group: webconfig-dev
    jobs:
      - job: Build
        steps:
          - template: pipeline/steps-build-webconfig.yml
            parameters:
              environment: dev
              vaultName: $(KeyVaultName)
              serviceConnection: $(KeyVaultServiceConnection)
              secretNames:
                - DefaultConnection

  - stage: Prod
    displayName: Build web.config (prod)
    dependsOn: Dev
    variables:
      - group: webconfig-prod
    jobs:
      - job: Build
        steps:
          - template: pipeline/steps-build-webconfig.yml
            parameters:
              environment: prod
              vaultName: $(KeyVaultName)
              serviceConnection: $(KeyVaultServiceConnection)
              secretNames:
                - DefaultConnection
                - StorageConnection
