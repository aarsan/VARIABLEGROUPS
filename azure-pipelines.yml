# Builds a web.config for a given environment by:
#   1. Running Build-WebConfig.ps1 to produce a fully tokenized web.config
#   2. Pulling non-secret values from `webconfig-common` (shared defaults) and
#      `webconfig-<env>` (env-specific overrides). Env wins on overlapping keys
#      because the env group is listed AFTER the common group.
#   3. Pulling prefixed secrets from `webconfig-common-secrets` and
#      `webconfig-<env>-secrets` (both linked to Azure Key Vault `Progger`)
#   4. Aliasing common-* and <env>-* secrets back to their bare names and
#      replacing #{...}# tokens
#   5. Publishing the finished web.config as a pipeline artifact

trigger:
  branches:
    include: [ main ]

pool:
  name: Default   # self-hosted agent pool; switch back to `vmImage: windows-latest` once MS-hosted parallelism is granted

stages:
  - stage: Dev
    displayName: Build web.config (dev)
    variables:
      - group: webconfig-common          # shared non-secret defaults
      - group: webconfig-common-secrets  # KV-linked shared secrets (common-*)
      - group: webconfig-dev             # dev-specific non-secrets (overrides common)
      - group: webconfig-dev-secrets     # KV-linked dev secrets (dev-*)
    jobs:
      - job: Build
        steps:
          - template: pipeline/steps-build-webconfig.yml
            parameters:
              environment: dev
              commonSecretNames: []      # add names here once common secrets exist
              secretNames:
                - DefaultConnection

  - stage: Prod
    displayName: Build web.config (prod)
    dependsOn: Dev
    variables:
      - group: webconfig-common          # shared non-secret defaults
      - group: webconfig-common-secrets  # KV-linked shared secrets (common-*)
      - group: webconfig-prod            # prod-specific non-secrets (overrides common)
      - group: webconfig-prod-secrets    # KV-linked prod secrets (prod-*)
    jobs:
      - job: Build
        steps:
          - template: pipeline/steps-build-webconfig.yml
            parameters:
              environment: prod
              commonSecretNames: []      # add names here once common secrets exist
              secretNames:
                - DefaultConnection
                - StorageConnection
