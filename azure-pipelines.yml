# Builds a web.config for a given environment by:
#   1. Running Build-WebConfig.ps1 to produce a tokenized web.config
#   2. Pulling env-prefixed secrets from Azure Key Vault and aliasing them
#   3. Replacing #{...}# tokens with values from the variable group + AKV
#   4. Publishing the finished web.config as a pipeline artifact

trigger:
  branches:
    include: [ main ]

pool:
  name: Default   # self-hosted agent pool; switch back to `vmImage: windows-latest` once MS-hosted parallelism is granted

# Service connection name + Key Vault name are referenced via template
# parameters (resolved at compile time), not runtime $() variables, because
# `AzureKeyVault@2` resolves them during pipeline validation server-side.
stages:
  - stage: Dev
    displayName: Build web.config (dev)
    variables:
      - group: webconfig-dev
    jobs:
      - job: Build
        steps:
          - template: pipeline/steps-build-webconfig.yml
            parameters:
              environment: dev
              vaultName: Progger
              serviceConnection: Ahmet-Azure-Sub-V2
              secretNames:
                - DefaultConnection

  - stage: Prod
    displayName: Build web.config (prod)
    dependsOn: Dev
    variables:
      - group: webconfig-prod
    jobs:
      - job: Build
        steps:
          - template: pipeline/steps-build-webconfig.yml
            parameters:
              environment: prod
              vaultName: Progger
              serviceConnection: Ahmet-Azure-Sub-V2
              secretNames:
                - DefaultConnection
                - StorageConnection
