# Builds a web.config for a given environment by:
#   1. Running Build-WebConfig.ps1 to produce a tokenized web.config
#   2. Pulling non-secret values from the `webconfig-<env>` variable group
#   3. Pulling env-prefixed secrets from the `webconfig-<env>-secrets`
#      variable group (linked to Azure Key Vault `Progger`)
#   4. Aliasing env-prefixed secrets back to their bare names and replacing
#      #{...}# tokens
#   5. Publishing the finished web.config as a pipeline artifact

trigger:
  branches:
    include: [ main ]

pool:
  name: Default   # self-hosted agent pool; switch back to `vmImage: windows-latest` once MS-hosted parallelism is granted

stages:
  - stage: Dev
    displayName: Build web.config (dev)
    variables:
      - group: webconfig-dev          # non-secret values
      - group: webconfig-dev-secrets  # Key-Vault-linked secrets (dev-*)
    jobs:
      - job: Build
        steps:
          - template: pipeline/steps-build-webconfig.yml
            parameters:
              environment: dev
              secretNames:
                - DefaultConnection

  - stage: Prod
    displayName: Build web.config (prod)
    dependsOn: Dev
    variables:
      - group: webconfig-prod          # non-secret values
      - group: webconfig-prod-secrets  # Key-Vault-linked secrets (prod-*)
    jobs:
      - job: Build
        steps:
          - template: pipeline/steps-build-webconfig.yml
            parameters:
              environment: prod
              secretNames:
                - DefaultConnection
                - StorageConnection
